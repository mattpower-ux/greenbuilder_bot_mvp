services:
  - type: web
    name: greenbuilder-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: SITE_BASE_URL
        value: https://www.greenbuildermedia.com
      - key: SITEMAP_URL
        value: https://www.greenbuildermedia.com/sitemap.xml
